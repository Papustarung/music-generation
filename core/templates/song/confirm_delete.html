{% extends "core/base.html" %}
{% block title %}Delete Song{% endblock %}
{% block content %}
<h1>Delete Song</h1>
<p>Are you sure you want to delete <strong>{{ object }}</strong>?</p>
<form method="post">
  {% csrf_token %}
  <button type="submit">Yes, Delete</button>
  <a href="{% url 'song_list' %}">Cancel</a>
</form>
{% endblock %}
